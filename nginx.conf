# Social/OG crawlers — serve static HTML; real browsers get a 302
map $http_user_agent $is_social_crawler {
    default                   0;
    "~*facebookexternalhit"   1;
    "~*facebot"               1;
    "~*Twitterbot"            1;
    "~*LinkedInBot"           1;
    "~*WhatsApp"              1;
    "~*TelegramBot"           1;
    "~*Slackbot"              1;
    "~*Discordbot"            1;
    "~*ia_archiver"           1;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/javascript;
    gzip_min_length 1000;

    # Vietnamese OG page: crawlers get static HTML, browsers get a clean redirect
    location = /vi/ {
        if ($is_social_crawler) {
            rewrite ^ /vi/index.html last;
        }
        return 302 /?lang=vi;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "public, no-cache";
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|pdf)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
} 